<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HYROX 30-Day Training</title>
<style>
:root{--bg:#0b0f14;--surf:#141920;--surf2:#1d2430;--surf3:#252d3a;--ac:#c8f400;--text:#e8edf3;--muted:#7a8696;--bdr:#2a3340}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.page{display:none;max-width:640px;margin:0 auto;padding-bottom:60px;animation:fadeUp .22s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Calendar */
.cal-header{padding:24px 20px 18px;background:linear-gradient(180deg,var(--surf) 0%,var(--bg) 100%);border-bottom:1px solid var(--bdr)}
.cal-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac);display:inline-block;margin-right:8px;vertical-align:middle}
.cal-title{font-size:28px;font-weight:900;letter-spacing:-.03em;margin-top:2px}
.cal-sub{font-size:13px;color:var(--muted);margin-top:3px}
.prog-bar{height:4px;background:var(--surf3);border-radius:4px;margin-top:14px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#c8f400,#39d353);border-radius:4px;transition:width .4s ease}
.prog-labels{display:flex;justify-content:space-between;margin-top:5px}
.prog-labels span{font-size:11px;color:#4a5568}
.prog-labels span.pct{color:var(--ac);font-weight:800}
.cal-body{padding:18px 14px}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.dow-cell{text-align:center;font-size:11px;font-weight:700;color:#4a5568;padding:3px 0}
.week-block{margin-bottom:14px}
.week-label{font-size:10px;color:#4a5568;font-weight:700;letter-spacing:.1em;margin-bottom:5px}
.week-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-btn{border-radius:10px;padding:8px 4px 7px;text-align:center;border:2px solid transparent;background:var(--surf2);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.day-btn:hover{filter:brightness(1.2)}
.day-btn.rest-day{background:#141920}
.day-btn.done{border-color:var(--done-ac,#c8f400);background:color-mix(in srgb,var(--done-ac,#c8f400) 15%,transparent)}
.day-num{font-size:13px;font-weight:900}
.day-icon{font-size:15px;margin-top:1px}
.day-dot{width:7px;height:7px;border-radius:50%;margin:3px auto 0}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;padding:14px;background:var(--surf);border-radius:10px;border:1px solid var(--bdr)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}
/* Day view */
.day-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr);background:var(--surf);position:sticky;top:0;z-index:10}
.back-btn{color:var(--muted);font-size:13px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,.05)}
.nav-btns{display:flex;gap:8px}
.nav-btn{color:var(--text);font-size:18px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.06)}
.nav-btn:disabled{color:var(--bdr);background:transparent;cursor:default}
.day-header{padding:22px 20px 20px;border-bottom:1px solid rgba(200,244,0,.1)}
.day-week-label{font-size:11px;font-weight:800;letter-spacing:.12em;margin-bottom:6px}
.day-title-row{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.day-icon-big{font-size:36px;line-height:1}
.day-type{font-size:22px;font-weight:900;letter-spacing:-.02em}
.day-sublabel{font-size:14px;color:var(--muted);margin-top:2px}
.day-stats{display:flex;gap:10px}
.stat-box{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:10px 14px;border:1px solid var(--bdr);text-align:left}
.stat-val{font-size:18px;font-weight:900}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.1em;margin-top:2px}
.day-body{padding:18px 16px}
.section-label{font-size:10px;font-weight:700;color:var(--bdr);letter-spacing:.12em;margin-bottom:10px}
.ex-card{background:var(--surf2);border-radius:12px;margin-bottom:9px;border:1px solid var(--bdr);transition:border-color .2s;overflow:hidden}
.ex-card.open{border-color:rgba(200,244,0,.25)}
.ex-inner{padding:14px 16px;cursor:pointer}
.ex-row{display:flex;gap:12px;align-items:flex-start}
.ex-num{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:rgba(200,244,0,.1);border:1px solid rgba(200,244,0,.25);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--ac)}
.ex-content{flex:1;min-width:0}
.ex-name-row{display:flex;justify-content:space-between;align-items:center;gap:6px}
.ex-name{font-weight:700;font-size:15px}
.ex-chevron{color:#4a5568;font-size:12px;flex-shrink:0;transition:color .2s}
.ex-card.open .ex-chevron{color:var(--ac)}
.ex-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.badge{padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid transparent}
.badge-sets{background:rgba(200,244,0,.1);border-color:rgba(200,244,0,.22);color:var(--ac);font-weight:800}
.badge-detail{background:var(--surf);border-color:var(--bdr)}
.badge-rest{background:rgba(74,154,255,.08);border-color:rgba(74,154,255,.18);color:#7a9cc8}
.badge-rpe{font-weight:700}
.howto{margin-top:12px;padding:12px 14px;background:rgba(200,244,0,.05);border-radius:8px;border-left:3px solid var(--ac)}
.howto-label{font-size:10px;font-weight:800;color:var(--ac);letter-spacing:.12em;margin-bottom:8px}
.howto-cue{display:flex;gap:8px;margin-bottom:7px}
.howto-cue:last-child{margin-bottom:0}
.howto-n{color:var(--ac);font-weight:800;font-size:11px;min-width:14px;padding-top:2px;flex-shrink:0}
.howto-text{font-size:13px;color:#9ab0c0;line-height:1.55}
.rest-empty{text-align:center;padding:60px 20px}
.rest-emoji{font-size:52px;margin-bottom:14px}
.rest-title{font-size:20px;font-weight:800;margin-bottom:8px}
.rest-text{font-size:14px;color:var(--muted);line-height:1.65;max-width:280px;margin:0 auto}
.race-banner{background:rgba(255,68,34,.08);border:1px solid rgba(255,68,34,.22);border-radius:12px;padding:14px 16px;margin-bottom:18px;text-align:center}
.race-banner-title{font-weight:800;font-size:15px;color:#ff6644;margin-bottom:6px}
.race-banner-text{font-size:13px;color:#9ab0c0;line-height:1.6}
.complete-btn{width:100%;margin-top:18px;padding:16px;border-radius:12px;font-size:14px;font-weight:900;letter-spacing:.06em;transition:all .2s}
.complete-btn.done{background:rgba(57,211,83,.12);color:#39d353;border:1px solid rgba(57,211,83,.3)}
.complete-btn.todo{background:linear-gradient(135deg,#c8f400,#9bc100);color:#0b0f14;border:none}
</style>
</head>
<body>

<div id="cal-page" class="page active">
  <div class="cal-header">
    <div><span class="cal-dot"></span><span style="font-size:11px;font-weight:800;color:var(--ac);letter-spacing:.14em">HYROX TRAINING</span></div>
    <div class="cal-title">30-Day Race Prep</div>
    <div class="cal-sub" id="cal-sub">0 of 30 sessions complete</div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-labels"><span>Start</span><span class="pct" id="prog-pct">0%</span><span>Race Day</span></div>
  </div>
  <div class="cal-body">
    <div class="dow-row">
      <div class="dow-cell">Mo</div><div class="dow-cell">Tu</div><div class="dow-cell">We</div>
      <div class="dow-cell">Th</div><div class="dow-cell">Fr</div><div class="dow-cell">Sa</div>
      <div class="dow-cell">Su</div>
    </div>
    <div id="cal-grid"></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#4aa8ff"></div>Run</div>
      <div class="leg-item"><div class="leg-dot" style="background:#39d353"></div>Stations</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c679ff"></div>Strength</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f0a500"></div>Tempo</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c8f400"></div>Sim / Race</div>
      <div class="leg-item"><div class="leg-dot" style="background:#7a9cc8"></div>Recovery</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4a5568"></div>Rest</div>
    </div>
  </div>
</div>

<div id="day-page" class="page">
  <div class="day-topbar">
    <button class="back-btn" onclick="showCal()">← Calendar</button>
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn" onclick="navDay(-1)">‹</button>
      <button class="nav-btn" id="next-btn" onclick="navDay(1)">›</button>
    </div>
  </div>
  <div class="day-header" id="day-header"></div>
  <div class="day-body" id="day-body"></div>
</div>

<script>
/* ── DATA ── */
const HT = {

/* ── STATE ── */
let completed = new Set();
try{ const s=localStorage.getItem("hyrox_v2"); if(s) completed=new Set(JSON.parse(s)); }catch{}
let currentDay = 1;

function save(){ try{localStorage.setItem("hyrox_v2",JSON.stringify([...completed]));}catch{} }

/* ── HELPERS ── */
function rpeColor(r){ return r<=3?"#39d353":r<=5?"#7ab8ff":r<=7?"#f0a500":r<=8?"#ff8c00":"#f85149"; }

/* ── CALENDAR ── */
function buildCal(){
  const grid=document.getElementById("cal-grid");
  grid.innerHTML="";
  const wkNames=["","Week 1","Week 2","Week 3","Week 4","Race Week"];
  for(let row=0;row<5;row++){
    const block=document.createElement("div");
    block.className="week-block";
    // week label from first non-null day in row
    const firstDay=DAYS[row*7];
    const wkNum=firstDay?firstDay.week:4;
    const wkLabel=row<4?wkNames[wkNum]:"Race Week";
    block.innerHTML=`<div class="week-label">${wkLabel}</div>`;
    const rowEl=document.createElement("div");
    rowEl.className="week-row";
    for(let col=0;col<7;col++){
      const idx=row*7+col;
      if(idx>=30){rowEl.appendChild(document.createElement("div"));continue;}
      const d=DAYS[idx];
      const meta=TYPE_META[d.type]||{ac:"#c8f400",icon:"💪"};
      const isDone=completed.has(d.day);
      const isRest=d.type==="REST";
      const isRace=d.type==="RACE DAY";
      const btn=document.createElement("button");
      btn.className="day-btn"+(isRest?" rest-day":"")+(isDone?" done":"");
      if(isDone) btn.style.setProperty("--done-ac",meta.ac);
      let iconHtml;
      if(isDone) iconHtml="✓";
      else if(isRace) iconHtml="🏅";
      else if(isRest) iconHtml="—";
      else iconHtml=`<div class="day-dot" style="background:${meta.ac}"></div>`;
      btn.innerHTML=`<div class="day-num" style="color:${isDone?meta.ac:isRest?"#4a5568":"var(--text)"}">${d.day}</div><div class="day-icon">${iconHtml}</div>`;
      btn.onclick=()=>showDay(d.day);
      rowEl.appendChild(btn);
    }
    block.appendChild(rowEl);
    grid.appendChild(block);
  }
  updateProgress();
}

function updateProgress(){
  const pct=Math.round((completed.size/30)*100);
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-pct").textContent=pct+"%";
  document.getElementById("cal-sub").textContent=`${completed.size} of 30 sessions complete`;
}

/* ── DAY VIEW ── */
function showDay(day){
  currentDay=day;
  renderDay();
  document.getElementById("cal-page").classList.remove("active");
  document.getElementById("day-page").classList.add("active");
  window.scrollTo(0,0);
}

function showCal(){
  document.getElementById("day-page").classList.remove("active");
  document.getElementById("cal-page").classList.add("active");
  buildCal();
  window.scrollTo(0,0);
}

function navDay(dir){
  const next=currentDay+dir;
  if(next>=1&&next<=30) showDay(next);
}

function renderDay(){
  const d=DAYS[currentDay-1];
  const meta=TYPE_META[d.type]||{ac:"#c8f400",icon:"💪"};
  const isDone=completed.has(d.day);
  const isRest=d.type==="REST";
  const isRace=d.type==="RACE DAY";

  // nav buttons
  document.getElementById("prev-btn").disabled=currentDay<=1;
  document.getElementById("next-btn").disabled=currentDay>=30;

  // header
  const header=document.getElementById("day-header");
  header.style.background=`linear-gradient(135deg,${meta.ac}12 0%,var(--bg) 100%)`;
  header.style.borderBottom=`1px solid ${meta.ac}20`;
  let statsHtml="";
  if(!isRest){
    statsHtml=`<div class="day-stats">
      <div class="stat-box"><div class="stat-val" style="color:${meta.ac}">${d.dur}</div><div class="stat-lbl">DURATION</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${meta.ac}">${d.exercises.length}</div><div class="stat-lbl">EXERCISES</div></div>
    </div>`;
  }
  header.innerHTML=`
    <div class="day-week-label" style="color:${meta.ac}">${WK_LABELS[d.week]||"Race Week"} · DAY ${d.day} OF 30</div>
    <div class="day-title-row">
      <div class="day-icon-big">${meta.icon}</div>
      <div><div class="day-type">${d.type}</div><div class="day-sublabel">${d.label}</div></div>
    </div>
    ${statsHtml}`;

  // body
  const body=document.getElementById("day-body");
  let html="";
  if(isRest){
    html=`<div class="rest-empty">
      <div class="rest-emoji">😴</div>
      <div class="rest-title">Rest Day</div>
      <div class="rest-text">Adaptation happens at rest. Sleep 8+ hours, eat well, and let your body absorb the training load.</div>
    </div>`;
  } else {
    if(isRace){
      html+=`<div class="race-banner">
        <div class="race-banner-title">🏅 RACE DAY STRATEGY</div>
        <div class="race-banner-text">Conservative on runs 1–2. Trust every rep you've done. Attack the final 2 km.</div>
      </div>`;
    } else {
      html+=`<div class="section-label">EXERCISES — TAP FOR TECHNIQUE CUES</div>`;
    }
    d.exercises.forEach((e,i)=>{ html+=buildExCard(e,i); });
  }
  const btnClass=isDone?"done":"todo";
  const btnLabel=isDone?"✓ COMPLETED":isRest?"MARK REST TAKEN":"MARK COMPLETE";
  html+=`<button class="complete-btn ${btnClass}" id="complete-btn" onclick="toggleComplete(${d.day})">${btnLabel}</button>`;
  body.innerHTML=html;
  // re-attach howto toggles
  body.querySelectorAll(".ex-inner[data-idx]").forEach(el=>{
    el.addEventListener("click",()=>toggleHowTo(parseInt(el.dataset.idx),d));
  });
}

function buildExCard(e,i){
  const hasCues=!!HT[e.ht];
  const rpeC=rpeColor(e.rpe);
  let badges=``;
  if(e.sets>1) badges+=`<span class="badge badge-sets">${e.sets}× sets</span>`;
  badges+=`<span class="badge badge-detail">${e.detail}</span>`;
  if(e.rest!=="—") badges+=`<span class="badge badge-rest">⏱ ${e.rest}</span>`;
  badges+=`<span class="badge badge-rpe" style="background:${rpeC}15;border-color:${rpeC}35;color:${rpeC}">RPE ${e.rpe}</span>`;
  return `<div class="ex-card" id="exc-${i}">
    <div class="ex-inner" data-idx="${i}" ${hasCues?'style="cursor:pointer"':''}>
      <div class="ex-row">
        <div class="ex-num">${i+1}</div>
        <div class="ex-content">
          <div class="ex-name-row">
            <span class="ex-name">${e.n}</span>
            ${hasCues?`<span class="ex-chevron">▼</span>`:""}
          </div>
          <div class="ex-badges">${badges}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleHowTo(idx, d){
  const e=d.exercises[idx];
  if(!HT[e.ht]) return;
  const card=document.getElementById("exc-"+idx);
  const inner=card.querySelector(".ex-inner");
  const chevron=card.querySelector(".ex-chevron");
  const existing=card.querySelector(".howto");
  if(existing){
    existing.remove();
    card.classList.remove("open");
    if(chevron) chevron.textContent="▼";
  } else {
    card.classList.add("open");
    if(chevron) chevron.textContent="▲";
    const cues=HT[e.ht];
    let cueHtml=cues.map((c,i)=>`<div class="howto-cue"><span class="howto-n">${i+1}.</span><span class="howto-text">${c}</span></div>`).join("");
    const div=document.createElement("div");
    div.className="howto";
    div.innerHTML=`<div class="howto-label">HOW TO</div>${cueHtml}`;
    inner.appendChild(div);
  }
}

function toggleComplete(day){
  if(completed.has(day)) completed.delete(day);
  else completed.add(day);
  save();
  renderDay();
}

/* ── INIT ── */
buildCal();
</script>
</body>
</html>
